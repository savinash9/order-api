$kind: http-request
url: "{{baseUrl}}/orders"
method: GET
body:
  type: text
  content: |-
    // Visualization Script
    const template = `
    <style>
      table {
        width: 100%;
        border-collapse: collapse;
        font-family: Arial, sans-serif;
        font-size: 14px;
      }
      th {
        background-color: #f0f0f0;
        padding: 12px;
        text-align: left;
        border: 1px solid #ddd;
        font-weight: bold;
      }
      td {
        padding: 10px 12px;
        border: 1px solid #ddd;
      }
      tr:nth-child(even) {
        background-color: #f9f9f9;
      }
      tr:hover {
        background-color: #f0f0f0;
      }
    </style>
    <table>
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Customer ID</th>
          <th>Order Date</th>
          <th>Status</th>
          <th>Total</th>
          <th>Items Count</th>
        </tr>
      </thead>
      <tbody>
        {{#each orders}}
        <tr>
          <td>{{id}}</td>
          <td>{{customerId}}</td>
          <td>{{orderDate}}</td>
          <td>{{status}}</td>
          <td>${{total}}</td>
          <td>{{itemsCount}}</td>
        </tr>
        {{/each}}
      </tbody>
    </table>
    `;

    function createPayload() {
      const response = pm.response.json();
      return {
        orders: response.map(order => ({
          id: order.id || 'N/A',
          customerId: order.customerId || 'N/A',
          orderDate: order.orderDate ? new Date(order.orderDate).toLocaleDateString() : 'N/A',
          status: order.status || 'N/A',
          total: (order.total || 0).toFixed(2),
          itemsCount: (order.items && order.items.length) || 0
        }))
      };
    }

    pm.visualizer.set(template, createPayload());
scripts:
  - type: afterResponse
    code: |-
      // Visualization Script
      // Visualization Script
      const template = `
      <style>
        table {
          width: 100%;
          border-collapse: collapse;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          font-size: 13px;
        }
        th {
          background-color: #f5f5f5;
          padding: 12px;
          text-align: left;
          font-weight: 600;
          border-bottom: 2px solid #e0e0e0;
          color: #333;
        }
        td {
          padding: 12px;
          border-bottom: 1px solid #e0e0e0;
        }
        tr:hover {
          background-color: #fafafa;
        }
        .status-completed {
          color: #2e7d32;
          font-weight: 500;
        }
        .status-pending {
          color: #f57c00;
          font-weight: 500;
        }
        .status-shipped {
          color: #1976d2;
          font-weight: 500;
        }
        .price {
          text-align: right;
          font-weight: 500;
        }
      </style>
      <table>
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Customer ID</th>
            <th>Order Date</th>
            <th>Status</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody>
          {{#each orders}}
          <tr>
            <td>{{id}}</td>
            <td>{{customerId}}</td>
            <td>{{orderDate}}</td>
            <td><span class="status-{{status}}">{{status}}</span></td>
            <td class="price">\${{total}}</td>
          </tr>
          {{/each}}
        </tbody>
      </table>
      `;

      function createPayload() {
        const responseData = pm.response.json();
        return {
          orders: responseData.map(order => ({
            id: order.id || 'N/A',
            customerId: order.customerId || 'N/A',
            orderDate: new Date(order.orderDate).toLocaleDateString('en-US', { 
              year: 'numeric', 
              month: 'short', 
              day: 'numeric',
              hour: '2-digit',
              minute: '2-digit'
            }),
            status: order.status || 'N/A',
            total: (order.total || 0).toFixed(2)
          }))
        };
      }

      pm.visualizer.set(template, createPayload());
    language: text/javascript
examples: ./.resources/List Orders.resources/examples
order: 1000
